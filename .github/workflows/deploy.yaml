name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "charts/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/deploy.yaml"

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-west-2
  EKS_CLUSTER_NAME: joshua-eks
  ECR_REPOSITORY: joshua-server

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_short }}
      ecr_registry: ${{ steps.ecr-login.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/joshua-eks-github-actions
          role-session-name: deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419

      - name: Generate image metadata
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: cmd/server/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.sha_short }}

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/joshua-eks-github-actions
          role-session-name: deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "3.17.3"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Deploy to Kubernetes
        run: |
          helm upgrade --install joshua-server ./charts/joshua-server \
            --namespace default \
            --set image.repository=${{ needs.build-and-push.outputs.ecr_registry }}/${{ env.ECR_REPOSITORY }} \
            --set image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set otel.environment=dev \
            --atomic \
            --timeout 5m \
            --wait

      - name: Verify deployment
        if: success()
        run: |
          echo "--- Pods ---"
          kubectl get pods -o wide

          echo "--- Deployment ---"
          kubectl get deployments

          echo "--- Events ---"
          kubectl get events --sort-by='.lastTimestamp' | tail -10
