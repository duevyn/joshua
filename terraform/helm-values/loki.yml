deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  # ---- OTLP ingestion ----
  # Loki 3.x exposes a native OTLP HTTP receiver at /otlp/v1/logs without
  # additional opt-in. The collector pushes to it via the otlphttp exporter
  # (see otel-collector.yaml) — the deprecated standalone `loki` exporter
  # is intentionally not used.
  #
  # allow_structured_metadata is REQUIRED for OTLP writes: any OTLP
  # attribute that isn't promoted to a stream label is stored as structured
  # metadata, and Loki rejects writes if the flag is off. It defaults to
  # true in Loki 3.x but we pin it explicitly so the dependency is visible
  # in code review.
  limits_config:
    allow_structured_metadata: true

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: gp3
    size: 20Gi

# Disable components not used in SingleBinary mode
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

gateway:
  enabled: false

test:
  enabled: false

lokiCanary:
  enabled: false

# Disable external memcached caching — Loki's readiness probe requires
# memcached to be reachable before passing. In SingleBinary mode the
# in-process cache is sufficient; external caching is for multi-replica
# production deployments.
chunksCache:
  enabled: false
resultsCache:
  enabled: false
